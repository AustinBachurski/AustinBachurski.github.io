<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bachurski.terminal</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./src/css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
    </head>
    <body>
        <!-- Anchor for scanline CSS overlay. -->
        <div id="scanline-overlay" aria-hidden="true"></div>

        <div id="terminal-border">

            <!-- Teletype Terminal -->
            <div id="terminal-content">
                <div class="loading">
                    <span class="progress">Initializing</span>
                </div>
            </div>

            <!-- Terminal Input Display -->
            <div id="terminal-input-container" style="display: none">
                <div id="terminal-input-line">
                    <span id="terminal-user" class="terminal-input">guest@bach-term:</span>
                    <span id="terminal-cwd-display" class="terminal-input">~</span>
                    <span class="terminal-input">$ </span>
                    <span id="terminal-text-before-cursor" class="terminal-input"></span>
                    <span id="terminal-cursor" class="terminal-input"></span>
                    <span id="terminal-text-after-cursor" class="terminal-input"></span>

                    <!-- Text Input (hidden) -->
                    <input id="hidden-terminal-input-element"
                        type="text"
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="false"
                        autocapitalize="off"
                        label="terminal input"
                        tabindex="0" />
                </div>
            </div>
        </div>
        <script type="module" src="./dist/main.js"></script>
    </body>
</html>
